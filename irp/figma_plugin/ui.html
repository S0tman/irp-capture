<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.2px;
    }

    .header-sub {
      font-size: 11px;
      color: #555;
    }

    .context-bar {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 11px;
      color: #666;
      min-height: 36px;
    }

    .context-bar span {
      color: #888;
    }

    label {
      font-size: 11px;
      color: #666;
      display: block;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 13px;
      padding: 10px 12px;
      resize: none;
      outline: none;
      line-height: 1.5;
    }

    textarea:focus {
      border-color: #444;
    }

    textarea::placeholder {
      color: #3a3a3a;
    }

    .field { display: flex; flex-direction: column; }

    button {
      background: #4f9eff;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: auto;
    }

    button:hover { background: #3d8ef0; }
    button:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

    .status {
      font-size: 11px;
      color: #555;
      text-align: center;
      min-height: 16px;
    }

    .status.ok { color: #4fd175; }
    .status.err { color: #ff6b6b; }

    .resolved-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .resolved-label {
      font-size: 11px;
      color: #666;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .resolved-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 120px;
      overflow-y: auto;
    }

    .resolved-item {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #aaa;
      cursor: pointer;
      line-height: 1.4;
      transition: border-color 0.15s;
    }

    .resolved-item:hover {
      border-color: #4f9eff;
      color: #e0e0e0;
    }

    .resolved-item .resolved-user {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    .resolved-empty {
      font-size: 11px;
      color: #333;
      font-style: italic;
    }

    .filekey-fallback input {
      flex: 1;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: monospace;
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
    }

    .filekey-fallback input:focus {
      border-color: #444;
    }

    .filekey-fallback input::placeholder {
      color: #3a3a3a;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">IRP Capture</div>
    <div class="header-sub">Append a decision to .irp/</div>
  </div>

  <div class="context-bar" id="context-bar">
    <span id="context-text">Loading context…</span>
  </div>

  <div class="filekey-fallback" id="filekey-fallback" style="display:none;">
    <label>File key <span style="text-transform:none;color:#444;">(from Figma URL: figma.com/design/<b>FILE_KEY</b>/…)</span></label>
    <div style="display:flex;gap:6px;">
      <input type="text" id="filekey-input" placeholder="Paste file key here" />
      <button id="filekey-btn" style="width:auto;margin-top:0;padding:8px 12px;font-size:11px;">Load</button>
    </div>
  </div>

  <div class="resolved-section" id="resolved-section" style="display:none;">
    <div class="resolved-label">Resolved comments</div>
    <div class="resolved-list" id="resolved-list"></div>
  </div>

  <div class="field">
    <label>Decision</label>
    <textarea id="decision" rows="4" placeholder="What was decided?"></textarea>
  </div>

  <div class="field">
    <label>Why</label>
    <textarea id="why" rows="4" placeholder="Why did this win over alternatives?"></textarea>
  </div>

  <button id="capture-btn" disabled>Capture</button>
  <div class="status" id="status"></div>

<script>
  const BRIDGE = "http://localhost:3002";
  const POLL_INTERVAL = 30000; // 30s live refresh
  let context = {};
  let activeFileKey = null;
  let pollTimer = null;
  let lastCommentIds = ""; // dedup: skip re-render if nothing changed

  // Request context from plugin sandbox
  parent.postMessage({ pluginMessage: { type: "get-context" } }, "*");

  // Fetch resolved comments from bridge
  async function loadResolvedComments(fileKey, silent) {
    if (!fileKey) return;
    try {
      const res = await fetch(`${BRIDGE}/comments?file_key=${encodeURIComponent(fileKey)}`);
      if (!res.ok) return;
      const data = await res.json();
      const comments = data.comments || [];

      // Dedup — don't re-render if the comment list hasn't changed
      const ids = comments.map(c => c.id).join(",");
      if (ids === lastCommentIds && silent) return;
      lastCommentIds = ids;

      const section = document.getElementById("resolved-section");
      const list = document.getElementById("resolved-list");

      if (comments.length === 0) {
        section.style.display = "none";
        if (!silent) {
          document.getElementById("status").textContent = "No resolved comments yet";
          document.getElementById("status").className = "status";
        }
        return;
      }

      if (!silent) {
        document.getElementById("status").textContent = `${comments.length} resolved comment${comments.length > 1 ? 's' : ''}`;
        document.getElementById("status").className = "status ok";
        setTimeout(() => { document.getElementById("status").textContent = ""; document.getElementById("status").className = "status"; }, 3000);
      }

      section.style.display = "flex";
      list.innerHTML = "";

      comments.forEach(c => {
        const item = document.createElement("div");
        item.className = "resolved-item";
        const text = c.message || "(no text)";
        const user = c.user || "unknown";
        item.innerHTML = `${escapeHtml(text)}<div class="resolved-user">${escapeHtml(user)}</div>`;
        item.addEventListener("click", () => {
          document.getElementById("decision").value = text;
          document.getElementById("why").focus();
          document.getElementById("capture-btn").disabled = false;
        });
        list.appendChild(item);
      });
    } catch (e) {
      if (!silent) {
        document.getElementById("status").textContent = "Could not reach bridge — is it running?";
        document.getElementById("status").className = "status err";
      }
      console.log("Could not load resolved comments:", e);
    }
  }

  function startPolling(fileKey) {
    if (pollTimer) clearInterval(pollTimer);
    activeFileKey = fileKey;
    // Initial fetch (not silent — show status)
    loadResolvedComments(fileKey, false);
    // Poll silently every 30s for new resolved comments
    pollTimer = setInterval(() => loadResolvedComments(fileKey, true), POLL_INTERVAL);
  }

  function escapeHtml(text) {
    const d = document.createElement("div");
    d.textContent = text;
    return d.innerHTML;
  }

  // Receive context back
  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === "context") {
      context = msg;
      const parts = [msg.page, msg.selection].filter(Boolean);
      document.getElementById("context-text").textContent = parts.join(" · ") || "No selection";
      document.getElementById("capture-btn").disabled = false;

      // Start polling if file key available (only once — ignore duplicate context messages)
      if (msg.fileKey && !activeFileKey) {
        startPolling(msg.fileKey);
      } else if (!msg.fileKey) {
        // Show manual file key input as fallback
        document.getElementById("filekey-fallback").style.display = "block";
        document.getElementById("status").textContent = "Paste file key to load resolved comments";
        document.getElementById("status").className = "status";
      }
    }
  };

  // Manual file key input handler
  document.getElementById("filekey-btn").addEventListener("click", () => {
    const raw = document.getElementById("filekey-input").value.trim();
    if (!raw) return;

    // Extract file key from full URL or accept raw key
    let fileKey = raw;
    const urlMatch = raw.match(/figma\.com\/(?:file|design)\/([a-zA-Z0-9]+)/);
    if (urlMatch) fileKey = urlMatch[1];

    document.getElementById("filekey-fallback").style.display = "none";
    startPolling(fileKey);
  });

  document.getElementById("filekey-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("filekey-btn").click();
  });

  // Enable button when decision is filled
  document.getElementById("decision").addEventListener("input", () => {
    const hasDecision = document.getElementById("decision").value.trim().length > 0;
    document.getElementById("capture-btn").disabled = !hasDecision;
  });

  document.getElementById("capture-btn").addEventListener("click", async () => {
    const decision = document.getElementById("decision").value.trim();
    const why = document.getElementById("why").value.trim();
    const status = document.getElementById("status");

    if (!decision) return;

    const payload = {
      decision,
      why: why || null,
      source: "figma",
      context: {
        page: context.page || null,
        selection: context.selection || null
      }
    };

    try {
      const res = await fetch(`${BRIDGE}/capture`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        parent.postMessage({ pluginMessage: { type: "captured" } }, "*");
        status.textContent = "Captured ✓";
        status.className = "status ok";
        document.getElementById("decision").value = "";
        document.getElementById("why").value = "";
        document.getElementById("capture-btn").disabled = true;
        // Refresh comments immediately — newly resolved comments may appear
        if (activeFileKey) {
          setTimeout(() => loadResolvedComments(activeFileKey, false), 1500);
        }
        setTimeout(() => { status.textContent = ""; status.className = "status"; }, 3000);
      } else {
        throw new Error(`Bridge returned ${res.status}`);
      }
    } catch (e) {
      parent.postMessage({ pluginMessage: { type: "error" } }, "*");
      status.textContent = "Bridge not reachable";
      status.className = "status err";
    }
  });
</script>
</body>
</html>
